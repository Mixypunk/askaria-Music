name: Build AskaSound APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version (ex: 1.2.0) — vide = auto'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── Calcul de version ─────────────────────────────────────────────
      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VERSION="${{ github.event.inputs.version_name }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          BUILD="${{ github.run_number }}"
          echo "version=$VERSION"       >> $GITHUB_OUTPUT
          echo "build=$BUILD"           >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"          >> $GITHUB_OUTPUT
          echo "apk_name=AskaSound V$VERSION.apk" >> $GITHUB_OUTPUT
          echo "Version: $VERSION+$BUILD"

      # ── Injecter la version dans pubspec.yaml ─────────────────────────
      - name: Update pubspec version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}+${{ steps.version.outputs.build }}/" pubspec.yaml
          echo "Version injectée :"
          grep "^version:" pubspec.yaml

      # ── Dépendances Flutter ───────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── Build APK Release ─────────────────────────────────────────────
      - name: Build APK
        run: |
          flutter build apk --release \
            --no-tree-shake-icons \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build }}

      # ── Renommer l'APK ────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          APK_DST="build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"
          cp "$APK_SRC" "$APK_DST"
          echo "APK : $(du -sh $APK_DST)"

      # ── Upload artifact (accès direct sans Release) ───────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      # ── Créer une GitHub Release avec l'APK ──────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AskaSound ${{ steps.version.outputs.tag }}"
          body: |
            ## 🎵 AskaSound ${{ steps.version.outputs.tag }}

            Build automatique déclenché par : `${{ github.event.head_commit.message }}`

            ---

            ### 📱 Installation
            1. Télécharge **`${{ steps.version.outputs.apk_name }}`** ci-dessous
            2. Ouvre le fichier sur ton téléphone Android
            3. Autorise "Sources inconnues" si demandé → Installer

            ### 🔄 Mise à jour automatique
            L'app vérifie automatiquement les nouvelles versions au démarrage.
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
